services:

  backend:
    build: .
    container_name: lubix-backend

    ports:
      - "8001:8000"

    volumes:
      - .:/app

    depends_on:
      - postgres

    env_file:
      - .env

    restart: always

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  postgres:
    image: postgres:16

    container_name: lubix-postgres

    restart: always

    env_file:
      - .env

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    ports:
      - "5434:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
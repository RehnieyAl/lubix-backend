services:

  backend:
    build: .
    container_name: lubix-backend

    ports:
      - "8000:8000"

    volumes:
      - .:/app

    depends_on:
      - postgres

    env_file:
      - .env

    restart: always

  postgres:
    image: postgres:16

    container_name: lubix-postgres

    restart: always

    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: lubixdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Register Company</title>
</head>
<body>

<h2>Register Company</h2>

<form id="companyForm">

    <input type="text" id="fullName" placeholder="Full Name" required><br><br>

    <input type="email" id="email" placeholder="Email" required><br><br>

    <input type="password" id="password" placeholder="Password" required><br><br>

    <input type="text" id="tell" placeholder="Phone" required><br><br>

    <input type="text" id="companyName" placeholder="Company Name" required><br><br>

    <input type="text" id="companyAddress" placeholder="Address" required><br><br>

    <input type="text" id="companyNIT" placeholder="NIT" required><br><br>

    <input type="text" id="companyNITDV" placeholder="DV" required><br><br>

    <input type="file" id="certificate" accept="application/pdf" required><br><br>

    <button type="submit">Register</button>

</form>

<pre id="response"></pre>

<script>
document.getElementById("companyForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const formData = new FormData();

    // USER
    formData.append("fullName", document.getElementById("fullName").value);
    formData.append("email", document.getElementById("email").value);
    formData.append("password", document.getElementById("password").value);
    formData.append("tell", document.getElementById("tell").value);

    // COMPANY
    formData.append("companyName", document.getElementById("companyName").value);
    formData.append("companyAddress", document.getElementById("companyAddress").value);
    formData.append("companyNIT", document.getElementById("companyNIT").value);
    formData.append("companyNITDV", document.getElementById("companyNITDV").value);

    // FILE
    const file = document.getElementById("certificate").files[0];
    formData.append("certificate", file);

    try {
        const response = await fetch("http://localhost:8001/Auth/register-company", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        document.getElementById("response").textContent =
            JSON.stringify(data, null, 2);

    } catch (error) {
        document.getElementById("response").textContent =
            "Error: " + error;
    }
});
</script>

</body>
</html>

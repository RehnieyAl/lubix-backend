<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login Empresa</title>
</head>
<body>

    <h2>Login Empresa</h2>

    <form id="loginForm">

        <input type="text" id="companyNIT" placeholder="NIT" required>
        <br><br>

        <input type="password" id="companyPassword" placeholder="Contraseña" required>
        <br><br>

        <button type="submit">Iniciar sesión</button>

    </form>

    <pre id="response"></pre>

<script>
document.getElementById("loginForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const data = {
        companyNIT: document.getElementById("companyNIT").value,
        companyPassword: document.getElementById("companyPassword").value
    };

    try {
        const response = await fetch("http://localhost:8001/Auth/login-company", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        const result = await response.json();

        document.getElementById("response").textContent =
            JSON.stringify(result, null, 2);

    } catch (error) {
        document.getElementById("response").textContent =
            "Error: " + error;
    }
});
</script>

</body>
</html>
